<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Atelier de la Flor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #fdfaf9; /* Arena lino ultra suave */
            --card-bg: #ffffff;
            --primary: #9e2a2b; /* Rojo Atelier / Granate elegante */
            --primary-hover: #7e1e20;
            --primary-light: #fbeeeeb;
            --neutral-dark: #2d1f1e; /* Marrón oscuro cálido */
            --neutral-muted: #8c7674;
            --border-color: #f0e6e3;
            
            /* Colores de Semáforo para estados de tareas */
            --color-pendiente: #e74c3c;  /* Rojo */
            --color-proceso: #f1c40f;    /* Amarillo */
            --color-completada: #2ecc71; /* Verde */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--neutral-dark);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary);
            margin: 0 0 5px 0;
            font-weight: 500;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
        }

        .status-badge {
            background-color: #f7ebe8;
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Pantalla de Acceso */
        .auth-screen {
            max-width: 420px;
            margin: 80px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(158, 42, 43, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo-frame {
            border: 1px solid var(--primary);
            padding: 15px;
            margin-bottom: 30px;
        }

        .logo-frame h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            font-family: 'Playfair Display', serif;
        }

        .auth-screen p {
            color: var(--neutral-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* Secciones y Pestañas del Menú */
        .navigation-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--neutral-dark);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Listado de Participantes */
        .participants-box {
            background: #fdf5f3;
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .participants-box h3 { 
            margin: 0 0 10px 0; 
            font-size: 0.85rem; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .participant-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .participant-tag {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--neutral-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .participant-tag.offline {
            opacity: 0.5;
            border-style: dashed;
        }

        /* Formularios e Inputs */
        .form-container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(44, 37, 35, 0.02);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--neutral-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            padding: 11px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--neutral-dark);
            outline: none;
            background-color: #fafaf9;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }

        /* Columnas de Estados (Tablero Kanban) */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .column {
            background-color: #f7ebe8;
            padding: 20px;
            border-radius: 8px;
            min-height: 400px;
            border: 1px solid var(--border-color);
        }

        .column h2 {
            font-size: 0.95rem;
            margin-top: 0;
            padding-bottom: 12px;
            color: var(--neutral-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .column.pendiente h2 { border-bottom: 3px solid var(--color-pendiente); }
        .column.proceso h2 { border-bottom: 3px solid var(--color-proceso); }
        .column.completada h2 { border-bottom: 3px solid var(--color-completada); }

        /* Tarjetas de Tareas Semáforo */
        .task-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            border-left: 5px solid #ccc;
        }

        .task-card.border-pendiente { border-left-color: var(--color-pendiente); }
        .task-card.border-proceso { border-left-color: var(--color-proceso); }
        .task-card.border-completada { border-left-color: var(--color-completada); }

        .task-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .task-info {
            font-size: 0.85rem;
            color: var(--neutral-muted);
            margin-bottom: 12px;
        }

        .task-info strong { color: var(--neutral-dark); }

        .task-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .btn-action {
            padding: 5px 10px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-next { background-color: var(--primary-light); color: var(--primary); border: 1px solid var(--primary); }
        .btn-prev { background-color: #ffffff; color: var(--neutral-muted); border: 1px solid var(--border-color); }
        .btn-delete { background-color: #fde8e8; color: #e74c3c; margin-left: auto; }

        .vencida { color: #e74c3c !important; font-weight: bold; }

        /* Panel de Lista Tradicional */
        .list-view-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .task-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        .task-table th, .task-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .task-table th {
            background-color: #fdf5f3;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }
        .badge.pendiente { background-color: #fadbd8; color: #c0392b; }
        .badge.proceso { background-color: #fcf3cf; color: #b7950b; }
        .badge.completada { background-color: #d4efdf; color: #1e8449; }

        /* Dashboards de Métricas y Gráficos */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .db-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            text-align: center;
        }

        .db-card h4 {
            margin: 0 0 15px 0;
            font-size: 0.95rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .chart-wrapper {
            position: relative;
            margin: auto;
            height: 220px;
            width: 220px;
        }

        /* Tabla de Rankings */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }
        .ranking-table th, .ranking-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }
        .ranking-table th { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="logo-frame">
        <h2>Atelier de la Flor</h2>
    </div>
    <p>Introduce tus credenciales corporativas para acceder al panel de agendas.</p>
    <form id="authForm">
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="authEmail">Correo Corporativo</label>
            <input type="email" id="authEmail" placeholder="nombre@atelierdelaflor.com" required>
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
            <label for="authPassword">Contraseña de Acceso</label>
            <input type="password" id="authPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" style="width: 100%;">Entrar a agendas de tareas</button>
    </form>
</div>

<div id="mainContent" class="container hidden">
    <header>
        <h1>Atelier de la Flor</h1>
        <div class="status-badge" id="sync-status">🔄 Sincronizando agendas...</div>
        <div id="userWelcome" style="font-weight: 500; color: var(--neutral-muted); font-size: 0.95rem;"></div>
    </header>

    <div class="navigation-menu">
        <button class="nav-btn active" onclick="switchView('kanban')">📋 Tablero de Tareas</button>
        <button class="nav-btn" onclick="switchView('list')">🔍 Mi Lista de Tareas</button>
        <button class="nav-btn" onclick="switchView('my-db')">🌸 Mis Métricas</button>
        <button class="nav-btn" onclick="switchView('global-db')">📊 Rendimiento General</button>
    </div>

    <div class="participants-box">
        <h3>👥 Conexiones activas:</h3>
        <div class="participant-tags" id="activeList">Cargando...</div>
    </div>

    <div id="section-kanban" class="view-section">
        <div class="form-container hidden" id="adminFormContainer">
            <form id="taskForm" class="form-grid">
                <div class="form-group">
                    <label for="taskTitle">Tarea / Pedido</label>
                    <input type="text" id="taskTitle" placeholder="Ej: Preparar ramo de novia preservado" required>
                </div>
                <div class="form-group">
                    <label for="taskWorker">Persona Asignada (Email)</label>
                    <select id="taskWorker" required>
                        <option value="">Selecciona una compañera...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskDeadline">Fecha Límite</label>
                    <input type="date" id="taskDeadline" required>
                </div>
                <button type="submit" class="btn-submit">+ Asignar Tarea</button>
            </form>
        </div>

        <div class="board">
            <div class="column pendiente">
                <h2>🔴 Pendientes (<span id="count-pendiente">0</span>)</h2>
                <div id="tasks-pendiente"></div>
            </div>
            <div class="column proceso">
                <h2>🟡 En Preparación (<span id="count-proceso">0</span>)</h2>
                <div id="tasks-proceso"></div>
            </div>
            <div class="column completada">
                <h2>🟢 Listos / Entregados (<span id="count-completada">0</span>)</h2>
                <div id="tasks-completada"></div>
            </div>
        </div>
    </div>

    <div id="section-list" class="view-section hidden">
        <div class="list-view-container">
            <h2 style="margin-top: 0; color: var(--primary); font-family: 'Playfair Display', serif;">Mis tareas asignadas</h2>
            <table class="task-table">
                <thead>
                    <tr>
