<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Atelier de la Flor</title>
    <style>
        :root {
            --bg-color: #fbf9f8; /* Un tono lino/arena muy suave y limpio */
            --card-bg: #ffffff;
            --primary: #d64a4a; /* El rojo coral/frambuesa de vuestro logotipo */
            --primary-hover: #bc3b3b;
            --neutral-dark: #2c2523; /* Un marrón café muy oscuro para textos legibles pero suaves */
            --neutral-muted: #8a7e7c; /* Gris/marrón deslavado para detalles */
            --border-color: #e8e2de;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', 'Segoe UI', serif;
            background-color: var(--bg-color);
            color: var(--neutral-dark);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--neutral-dark);
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .status-badge {
            background-color: #eae3df;
            color: var(--neutral-dark);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
        }

        /* Pantalla de Acceso */
        .auth-screen {
            max-width: 420px;
            margin: 80px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(44, 37, 35, 0.06);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo-frame {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 30px;
            position: relative;
        }

        .logo-frame h2 {
            margin: 0;
            color: var(--neutral-dark);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .auth-screen p {
            color: var(--neutral-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Listado de Participantes Activos / Ausentes */
        .participants-box {
            background: #f5f0ed;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }
        .participants-box h3 { 
            margin: 0 0 15px 0; 
            font-size: 0.9rem; 
            color: var(--neutral-dark); 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .participant-group {
            margin-bottom: 15px;
        }
        .participant-group:last-child {
            margin-bottom: 0;
        }
        .group-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--neutral-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .participant-tag {
            display: inline-block;
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--neutral-dark);
            padding: 4px 12px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .participant-tag.offline {
            opacity: 0.6;
            background: #fafaf9;
            border-style: dashed;
        }

        /* Formulario de Asignación */
        .form-container {

            padding: 25px;
