<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Atelier de la Flor</title>
    <style>
        :root {
            --bg-color: #fbf9f8; /* Un tono lino/arena muy suave y limpio */
            --card-bg: #ffffff;
            --primary: #d64a4a; /* El rojo coral/frambuesa de vuestro logotipo */
            --primary-hover: #bc3b3b;
            --neutral-dark: #2c2523; /* Un marrón café muy oscuro para textos legibles pero suaves */
            --neutral-muted: #8a7e7c; /* Gris/marrón deslavado para detalles */
            --border-color: #e8e2de;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', 'Segoe UI', serif;
            background-color: var(--bg-color);
            color: var(--neutral-dark);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--neutral-dark);
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .status-badge {
            background-color: #eae3df;
            color: var(--neutral-dark);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
        }

        /* Pantalla de Acceso */
        .auth-screen {
            max-width: 420px;
            margin: 80px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 4px; /* Bordes más rectos y limpios, como vuestro marco */
            box-shadow: 0 4px 20px rgba(44, 37, 35, 0.06);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        /* Réplica del marco del logotipo para la entrada */
        .logo-frame {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 30px;
            position: relative;
        }

        .logo-frame h2 {
            margin: 0;
            color: var(--neutral-dark);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .auth-screen p {
            color: var(--neutral-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Listado de Participantes Activos */
        .participants-box {
            background: #f5f0ed;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }
        .participants-box h3 { 
            margin: 0 0 10px 0; 
            font-size: 0.9rem; 
            color: var(--neutral-dark); 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .participant-tag {
            display: inline-block;
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--neutral-dark);
            padding: 4px 12px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Formulario de Asignación */
        .form-container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(44, 37, 35, 0.03);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            font-family: 'Segoe UI', sans-serif;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--neutral-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 11px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95rem;
            color: var(--neutral-dark);
            outline: none;
            background-color: #fafaf9;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: var(--neutral-muted);
            background-color: #ffffff;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* Columnas de Estados */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .column {
            background-color: #f5f0ed;
            padding: 20px;
            border-radius: 4px;
            min-height: 400px;
            border: 1px solid var(--border-color);
        }

        .column h2 {
            font-size: 1rem;
            margin-top: 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--neutral-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .column.pendiente h2 { border-bottom: 2px solid var(--warning); }
        .column.proceso h2 { border-bottom: 2px solid var(--primary); }
        .column.completada h2 { border-bottom: 2px solid var(--success); }

        /* Tarjetas de Tareas */
        .task-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(44, 37, 35, 0.02);
            border: 1px solid var(--border-color);
            border-left: 4px solid #ccc;
            position: relative;
        }

        .task-card.border-pendiente { border-left-color: var(--warning); }
        .task-card.border-proceso { border-left-color: var(--primary); }
        .task-card.border-completada { border-left-color: var(--success); }

        .task-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: var(--neutral-dark);
            font-family: 'Georgia', serif;
            font-weight: normal;
        }

        .task-info {
            font-size: 0.85rem;
            color: var(--neutral-muted);
            margin-bottom: 12px;
        }

        .task-info strong {
            color: var(--neutral-dark);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-action {
            padding: 5px 10px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-next { background-color: #f7e6db; color: var(--primary); }
        .btn-prev { background-color: #ffffff; color: var(--neutral-muted); border: 1px solid var(--border-color); }
        .btn-delete { background-color: #fde8e8; color: var(--danger); margin-left: auto; }

        .vencida {
            color: var(--danger) !important;
            font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO NEUTRA Y ELEGANTE -->
<div id="authScreen" class="auth-screen">
    <div class="logo-frame">
        <h2>Atelier de la Flor</h2>
    </div>
    <p>Introduce tu correo electrónico para gestionar y visualizar las tareas.</p>
    <form id="authForm">
        <div class="form-group" style="margin-bottom: 25px; text-align: left;">
            <label for="authEmail">Tu Correo Corporativo</label>
            <input type="email" id="authEmail" placeholder="nombre@atelierdelaflor.com" required>
        </div>
        <button type="submit" class="btn-submit">Entrar a agendas de tareas</button>
    </form>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="mainContent" class="container hidden">
    <header>
        <h1>Atelier de la Flor</h1>
        <div class="status-badge" id="sync-status">🔄 Sincronizando agendas...</div>
        <div id="userWelcome" style="font-weight: 400; color: var(--neutral-muted); font-size: 0.9rem; margin-top: 5px;"></div>
    </header>

    <!-- Caja de Participantes Registrados -->
    <div class="participants-box">
        <h3>👥 Integrantes activos en la agenda:</h3>
        <div id="participantsList">Cargando equipo...</div>
    </div>

    <!-- Formulario para agregar tareas -->
    <div class="form-container">
        <form id="taskForm" class="form-grid">
            <div class="form-group">
                <label for="taskTitle">Tarea / Pedido</label>
                <input type="text" id="taskTitle" placeholder="Ej: Preparar centro de mesa preservado" required>
            </div>
            <div class="form-group">
                <label for="taskWorker">Persona Asignada</label>
                <input type="text" id="taskWorker" placeholder="Ej: Sofía" required>
            </div>
            <div class="form-group">
                <label for="taskDeadline">Fecha Límite</label>
                <input type="date" id="taskDeadline" required>
            </div>
            <button type="submit" class="btn-submit">+ Asignar Tarea</button>
        </form>
    </div>

    <!-- Tablero de Estados -->
    <div class="board">
        <div class="column pendiente">
            <h2>Pendientes (<span id="count-pendiente">0</span>)</h2>
            <div id="tasks-pendiente"></div>
        </div>

        <div class="column proceso">
            <h2>En Preparación (<span id="count-proceso">0</span>)</h2>
            <div id="tasks-proceso"></div>
        </div>

        <div class="column completada">
            <h2>Listos / Entregados (<span id="count-completada">0</span>)</h2>
            <div id="tasks-completada"></div>
        </div>
    </div>
</div>

<!-- Cargamos Gun.js -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
    // ====================================================================
    // CONFIGURACIÓN DE TU EMPRESA
    // ====================================================================
    const DOMINIO_EMPRESA = '@atelierdelaflor'; 
    const MI_CLAVE_SECRETA = 'atelier-de-la-flor-vanguardia-2026';

    const gun = Gun([
        'https://gun-us.herokuapp.com/gun',
        'https://gun-matrix.herokuapp.com/gun'
    ]);
    
    const taskDb = gun.get(MI_CLAVE_SECRETA).get('tasks');
    const equipoDb = gun.get(MI_CLAVE_SECRETA).get('equipo');
    
    let localTasks = {};

    window.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('atelier_email');
        if (savedEmail) {
            entrarAlPanel(savedEmail);
        }
    });

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim().toLowerCase();

        if (!email.includes(DOMINIO_EMPRESA)) {
            alert(Acceso exclusivo: Introduce tu dirección que contenga ${DOMINIO_EMPRESA});
            return;
        }

        localStorage.setItem('atelier_email', email);
        equipoDb.get(email.replace(/\./g, '_')).put({ email: email, activo: true });
        entrarAlPanel(email);
    });

    function entrarAlPanel(email) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userWelcome').innerText = Sesión activa: ${email};
        
        setTimeout(() => {
            document.getElementById('sync-status').innerHTML = "🟢 Conexión con el taller sincronizada";
            document.getElementById('sync-status').style.backgroundColor = "#e7ebe4";
            document.getElementById('sync-status').style.color = "#354a21";
        }, 1500);

        arrancarSincronizacion();
    }

    function arrancarSincronizacion() {
        equipoDb.map().on(function(miembro, id) {
            if (miembro && miembro.activo) {
                renderizarEquipo();
            }
        });

        taskDb.map().on(function(task, id) {
            if (!task) return;
            if (task.active === false) {
                delete localTasks[id];
            } else {
                localTasks[id] = task;
            }
            renderTasks();
        });
    }

    function renderizarEquipo() {
        const listDiv = document.getElementById('participantsList');
        listDiv.innerHTML = '';
        
        equipoDb.once(function(data) {
            if(!data) return;
            Object.keys(data).forEach(key => {
                if(key !== '_' && data[key] && data[key].email) {
                    const tag = document.createElement('span');
                    tag.className = 'participant-tag';
                    tag.innerText = data[key].email;
                    listDiv.appendChild(tag);
                }
            });
        });
    }

    const taskForm = document.getElementById('taskForm');
    taskForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const title = document.getElementById('taskTitle').value;
        const worker = document.getElementById('taskWorker').value;
        const deadline = document.getElementById('taskDeadline').value;
        const taskId = 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

        taskDb.get(taskId).put({
            id: taskId,
            title: title,
            worker: worker,
            deadline: deadline,
            status: 'pendiente',
            active: true
        });

        taskForm.reset();
    });

    window.moveTask = function(id, nextStatus) {
        taskDb.get(id).put({ status: nextStatus });
    };

    window.deleteTask = function(id) {
        if(confirm('¿Quieres eliminar permanentemente esta tarea?')) {
            taskDb.get(id).put({ active: false });
        }
    };

    function renderTasks() {
        const columns = {
            pendiente: document.getElementById('tasks-pendiente'),
            proceso: document.getElementById('tasks-proceso'),
            completada: document.getElementById('tasks-completada')
        };

        const counts = { pendiente: 0, proceso: 0, completada: 0 };

        columns.pendiente.innerHTML = '';
        columns.proceso.innerHTML = '';
        columns.completada.innerHTML = '';

        const today = new Date().toISOString().split('T')[0];

        Object.values(localTasks).forEach(task => {
            if (!task.status || !task.active) return;
            
            counts[task.status]++;

            const isVencida = task.deadline < today && task.status !== 'completada';
            const deadlineClass = isVencida ? 'vencida' : '';
            const alertaVencido = isVencida ? ' ⚠️ ¡ENTREGA RETRASADA!' : '';

            let dateFormatted = task.deadline;
            if (task.deadline && task.deadline.includes('-')) {
                const [year, month, day] = task.deadline.split('-');
                dateFormatted = ${day}/${month}/${year};
            }

            let buttonsHTML = '';
            if (task.status === 'pendiente') {
                buttonsHTML = <button class="btn-action btn-next" onclick="moveTask('${task.id}', 'proceso')">Preparar →</button>;
            } else if (task.status === 'proceso') {
                buttonsHTML = `
                    <button class="btn-action btn-prev" onclick="moveTask('${task.id}', 'pendiente')">← Devolver</button>
                    <button class="btn-action btn-next" onclick="moveTask('${task.id}', 'completada')">Listo ✓</button>
                `;
            } else if (task.status === 'completada') {
                buttonsHTML = <button class="btn-action btn-prev" onclick="moveTask('${task.id}', 'proceso')">← Reabrir</button>;
            }

            const card = document.createElement('div');
            card.className = task-card border-${task.status};
            card.innerHTML = `
                <h3>${task.title}</h3>
                <div class="task-info">
                    <div><strong>Asignado a:</strong> ${task.worker}</div>
                    <div class="${deadlineClass}"><strong>Vence:</strong> ${dateFormatted}${alertaVencido}</div>
                </div>
                <div class="task-actions">
                    <button class="btn-action btn-delete" onclick="deleteTask('${task.id}')">Eliminar</button>
                    ${buttonsHTML}
                </div>
            `;

            columns[task.status].appendChild(card);
        });

        document.getElementById('count-pendiente').innerText = counts.pendiente;
        document.getElementById('count-proceso').innerText = counts.proceso;
        document.getElementById('count-completada').innerText = counts.completada;
    }
</script>
</body>
</html>
